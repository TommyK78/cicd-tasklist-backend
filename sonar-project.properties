# Identité du projet dans SonarQube
sonar.projectKey=cicd-tasklist-backend
sonar.projectName=TaskList Backend
sonar.projectVersion=1.0.0

# Sources et tests
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.ts

# Exclusions de l'analyse (fichiers générés / point d'entrée / config)
sonar.exclusions=node_modules/**,dist/**,coverage/**,prisma/**,**/*.config.ts,src/server.ts

# Couverture de code (rapport LCOV généré par Vitest / v8)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/__tests__/**,src/server.ts,src/app.ts,src/lib/prisma.ts

# Encodage des sources
sonar.sourceEncoding=UTF-8
