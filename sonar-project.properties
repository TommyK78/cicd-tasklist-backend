# Identité du projet dans SonarQube (instance de l'école)
# La clé correspond au nom du job Jenkins ; le projet est auto-créé au 1er scan.
sonar.projectKey=tommy-tasklist-backend-exam
sonar.projectName=tommy-tasklist-backend-exam

# Sources et tests
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.test.ts

# Couverture de code (rapport LCOV généré par Vitest / v8)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions de l'analyse (fichiers générés / point d'entrée / config)
sonar.exclusions=node_modules/**,dist/**,coverage/**,reports/**,prisma/**,src/server.ts
sonar.coverage.exclusions=src/__tests__/**,src/server.ts,src/app.ts,src/lib/prisma.ts

# Encodage des sources
sonar.sourceEncoding=UTF-8
# NB : sonar.host.url et le token sont injectés par Jenkins (withSonarQubeEnv), jamais en clair ici.
